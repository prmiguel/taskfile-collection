# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  install:
    desc: Install SDKMAN (Java SDK Manager)
    cmds:
      - cmd: |
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk version
        platforms: [linux, darwin, windows]
    preconditions:
      - sh: command -v curl
        msg: "curl is required to install SDKMAN."
      - sh: command -v java && java -version
        msg: "Java is recommended before installing SDKMAN."
    silent: true
