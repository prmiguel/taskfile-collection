      - cmd: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm install 24
        platforms: [linux, darwin]
      - cmd: nvm install 24
        platforms: [windows]
    silent: true
