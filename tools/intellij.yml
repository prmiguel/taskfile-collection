# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  install:
    desc: Install IntelliJ IDEA Community Edition
    cmds:
      - cmd: sudo snap install intellij-idea-community --classic
        platforms: [linux]
        if: test -f /etc/debian_version
      - cmd: sudo pacman -S --noconfirm intellij-idea-community-edition
        platforms: [linux]
        if: test -f /etc/arch-release
      - cmd: brew install --cask intellij-idea-ce
        platforms: [darwin]
      - cmd: winget install --id JetBrains.IntelliJIDEA.Community --source winget
        platforms: [windows]
    silent: true
